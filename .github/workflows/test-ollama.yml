name: Test Ollama AI

on:
  workflow_dispatch:

jobs:
  test-ollama:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      # Install Ollama
      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh

      # Start Ollama service
      - name: Start Ollama
        run: |
          ollama serve > ollama.log 2>&1 &
          sleep 10

      # Pull free model
      - name: Pull mistral Model
        run: |
          ollama pull mistral

      # Test AI Model
      - name: Test Ollama AI
        run: |
          curl http://localhost:11434/api/generate \
          -d '{
            "model": "mistral"
            "prompt": "Print numbers from 1 to 10",
            "stream": false
          }'
