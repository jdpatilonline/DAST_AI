name: Run Ollama and ZAP Agent

on:
  workflow_dispatch:

jobs:
  setup-and-run:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repository
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # Step 3: Create and activate virtual environment, install deps, run scripts
      - name: Install and run agent scripts
        run: |
          python3 -m venv zapenv
          source zapenv/bin/activate
          pip install --upgrade pip
          # pip install aiohttp python-owasp-zap-v2.4 pandas matplotlib playwright docx python-docx
          # python -m playwright install chromium
          # Run your prerequisite script
          python agent/pre_req.py
          # Run your enterprise agent script
          python agent/ollama_and_ZAP_Run.py
